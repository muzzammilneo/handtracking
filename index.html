<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowLink | Neural Hand Synapse</title>
    <meta name="description"
        content="Experience real-time hand tracking with neural-inspired visual links between fingers. Built with MediaPipe.">
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
</head>

<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader"></div>
        <p>Initializing Neural Engine...</p>
    </div>

    <main id="app-container">
        <div class="video-wrapper">
            <video id="input-video" playsinline></video>
            <canvas id="output-canvas"></canvas>

            <div class="overlay-ui">
                <header class="header">
                    <div class="title-group">
                        <h1>Hand Tracking</h1>
                        <p>Neural Hand Synapse</p>
                    </div>
                    <div class="status-badge">
                        <button id="toggle-controls" class="icon-btn" title="Toggle Controls">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                        <button id="share-btn" class="icon-btn" title="Share App" style="display: none;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                        </button>
                        <button id="fullscreen-btn" class="icon-btn" title="Toggle Fullscreen">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        </button>
                        <div id="status-dot" class="status-dot"></div>
                        <span id="status-text">Camera Off</span>
                    </div>
                </header>

                <div class="controls-panel">
                    <div class="control-item">
                        <label for="glow-intensity">Glow Intensity</label>
                        <input type="range" id="glow-intensity" min="5" max="50" value="25">
                    </div>
                    <div class="control-item">
                        <label for="line-width">Synapse Width</label>
                        <input type="range" id="line-width" min="1" max="10" value="3">
                    </div>
                    <div class="control-item">
                        <label for="particle-density">Neural Noise</label>
                        <input type="range" id="particle-density" min="0" max="100" value="30">
                    </div>
                </div>
            </div>

            <div class="instructions" id="instruction-text">
                Show both hands to establish neural link
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
